<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Smart Healthcare CRM</title>
  <meta name="description" content="Patient login portal for Smart Healthcare System CRM" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>

  <center>

    <div class="auth-wrapper">
      <div class="auth-card">

        <!-- Brand removed as it's now in the header -->
        <div class="brand-logo" style="display:none;">
          <div class="logo-icon">🏥</div>
          <h1>Smart Healthcare CRM</h1>
          <p></p>
        </div>

        <!-- Title -->
        <p class="section-title">Welcome</p>
        <p class="section-subtitle">Enter your email address or phone number to continue.</p>

        <!-- Alert box -->
        <div id="alertBox" class="alert-custom"></div>

        <!-- Login Form -->
        <form id="loginForm" novalidate>
          <div class="mb-4">
            <label for="identifier" class="form-label">Email or Phone</label>
            <div class="input-group">
              <span class="input-group-text">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                  <path
                    d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0zm4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4z" />
                </svg>
              </span>
              <input type="text" id="identifier" name="identifier" class="form-control"
                placeholder="your@email.com or 9876543210" autocomplete="username" required />
            </div>
          </div>

          <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-text">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                  <path
                    d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z" />
                </svg>
              </span>
              <input type="password" id="password" name="password" class="form-control" placeholder="••••••••"
                autocomplete="current-password" required />
            </div>
          </div>

          <button type="submit" class="btn-primary-custom" id="loginBtn">
            <span id="loginBtnText">Continue</span>
            <span id="loginSpinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status"></span>
          </button>
        </form>

        <div class="divider">or</div>

        <a href="register.html" class="btn-outline-custom">Register as New Patient</a>

        <p class="text-center mt-4" style="font-size:0.8rem; color: var(--text-muted);">
          <a href="#" class="link-primary">Good Helath</a> &amp;
          <a href="#" class="link-primary">Good Life</a>
        </p>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/header.js"></script>
    <script src="js/login.js"></script>
  </center>
</body>

</html>
