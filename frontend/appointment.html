<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Appointment — Smart Healthcare CRM</title>
    <meta name="description" content="Book a doctor appointment through Smart Healthcare System CRM" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body class="wide">

    <div class="wide-card-wrapper xl">

        <!-- Top bar removed as it's now in the header -->
        <div class="auth-card"
            style="border-radius:22px; overflow:hidden; padding:0; margin-bottom:20px; display:none;">
            <div class="appt-header d-flex align-items-center justify-content-between flex-wrap gap-3">
                <div>
                    <h2 style="color:#fff; font-weight:700; font-size:1.4rem; margin-bottom:4px;">Book Appointment</h2>
                    <p style="color:rgba(255,255,255,0.7); font-size:0.87rem; margin:0;">
                        Welcome, <strong id="patientNameDisplay">Patient</strong>
                    </p>
                </div>
                <button id="logoutBtnLegacy" class="btn-outline-custom"
                    style="width:auto; padding:8px 20px; font-size:0.85rem;">
                    ← Logout
                </button>
            </div>
        </div>

        <!-- Main booking card -->
        <div class="auth-card" style="padding:0; overflow:hidden;">

            <div class="appt-body">
                <!-- Alert -->
                <div id="alertBox" class="alert-custom"></div>

                <form id="appointmentForm" novalidate>

                    <!-- Step 1: Appointment Details -->
                    <div class="step-title">
                        <span class="step-badge">1</span> Appointment Details
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label for="appointmentDate" class="form-label">Appointment Date *</label>
                            <input type="date" id="appointmentDate" class="form-control" required />
                        </div>
                        <div class="col-md-6">
                            <label for="appointmentTime" class="form-label">Appointment Time *</label>
                            <select id="appointmentTime" class="form-select" required>
                                <option value="" disabled selected>Select a time slot</option>
                                <option>09:00</option>
                                <option>09:30</option>
                                <option>10:00</option>
                                <option>10:30</option>
                                <option>11:00</option>
                                <option>11:30</option>
                                <option>12:00</option>
                                <option>14:00</option>
                                <option>14:30</option>
                                <option>15:00</option>
                                <option>15:30</option>
                                <option>16:00</option>
                                <option>16:30</option>
                                <option>17:00</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="symptoms" class="form-label">Symptoms / Reason for Visit</label>
                        <textarea id="symptoms" class="form-control" rows="3"
                            placeholder="Describe your symptoms or reason for the appointment..."></textarea>
                    </div>

                    <button type="submit" class="btn-primary-custom" id="bookBtn">
                        <span id="bookBtnText">📅 Book Appointment</span>
                        <span id="bookSpinner" class="spinner-border spinner-border-sm ms-2 d-none"
                            role="status"></span>
                    </button>
                </form>
            </div>
        </div>

        <!-- Appointment History -->
        <div class="auth-card mt-4">
            <div class="step-title" style="margin-bottom:16px;">
                <span class="step-badge">📋</span> My Appointments
            </div>
            <div id="appointmentList">
                <p style="color:var(--text-muted); font-size:0.87rem; text-align:center;">No appointments yet.</p>
            </div>
        </div>

    </div><!-- /wrapper -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/header.js"></script>
    <script src="js/appointment.js"></script>
</body>

</html>
